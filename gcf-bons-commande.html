function loadDB() {
  try { return JSON.parse(localStorage.getItem(STORE)) || defaultDB(); }
  catch { return defaultDB(); }
}

function genNum() {
  const n = new Date(), p = v => String(v).padStart(2,"0");
  return String(n.getFullYear()).slice(2)+p(n.getMonth()+1)+p(n.getDate())+p(n.getHours())+p(n.getMinutes());
}

function money(v) {
  return new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:2}).format(v||0);
}

function today() { return new Date().toISOString().split("T")[0]; }

function formatDate(d) {
  if(!d) return "";
  const [y,m,j] = d.split("-");
  return `${j}/${m}/${y}`;
}

function toDataUrl(file) {
  return new Promise((resolve,reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

const inputStyle = {
  width:"100%", background:"#FAFAF8", border:"1.5px solid #E2DDD6",

  WebkitAppearance:"none",
};

const btnBase = {
  display:"block", width:"100%", padding:14, border:"none", borderRadius:12,
  fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:"0.88rem",
  letterSpacing:1, textTransform:"uppercase", cursor:"pointer", marginBottom:10,
};

function Btn({ children, primary, green, secondary, onClick, style={} }) {
  const bg = primary?"#C8400A":green?"#1A3A2A":"#fff";
  const color = primary||green?"white":"#1C1917";
  const border = secondary?"1.5px solid #E2DDD6":"none";
  return <button onClick={onClick} style={{...btnBase,background:bg,color,border,...style}}>{children}</button>;
}

function SectionTitle({ children }) {

    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.62rem",letterSpacing:2,textTransform:"uppercase",color:"#78716C",margin:"18px 0 10px",display:"flex",alignItems:"center",gap:8}}>
      {children}
      <div style={{flex:1,height:1,background:"#E2DDD6"}}/>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div style={{marginBottom:12}}>
      <label style={{display:"block",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.6rem",letterSpacing:"1.5px",textTransform:"uppercase",color:"#78716C",marginBottom:5}}>{label}</label>
      {children}

}

function BonCard({ bon, db, onDelete, onViewPhotos }) {
  const aff = db.affaires.find(a => a.id === bon.affaireId);
  return (
    <div style={{background:"#fff",border:"1px solid #E2DDD6",borderRadius:14,padding:"13px 13px 13px 17px",marginBottom:10,boxShadow:"0 2px 12px rgba(28,25,23,0.08)",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",left:0,top:0,bottom:0,width:4,background:bon.sent?"#15803D":"#C8400A",borderRadius:"4px 0 0 4px"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:"0.76rem",color:"#C8400A",background:"#F5E8E2",padding:"3px 8px",borderRadius:6}}>{bon.numero}</span>
        <span style={{fontFamily:"'Syne',sans-serif",fontSize:"0.58rem",fontWeight:700,letterSpacing:1,textTransform:"uppercase",padding:"3px 8px",borderRadius:6,background:bon.sent?"#DCFCE7":"#FEF3C7",color:bon.sent?"#15803D":"#92400E"}}>
          {bon.sent?"Envoyé":"À envoyer"}
        </span>
      </div>
      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.95rem",marginBottom:4}}>{bon.fournisseur}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:8}}>
        {[`📅 ${formatDate(bon.date)}`, aff&&`🏗️ ${aff.num}`, `👷 ${bon.chef||"—"}`, bon.prixEstime&&`💶 ${money(bon.prixEstime)}`].filter(Boolean).map((m,i)=>(
          <span key={i} style={{fontSize:"0.7rem",color:"#78716C"}}>{m}</span>
        ))}
      </div>
      {bon.detail && <div style={{fontSize:"0.7rem",color:"#78716C",marginBottom:8,lineHeight:1.4}}>{bon.detail}</div>}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {bon.photosBL?.length>0 && (
          <button onClick={()=>onViewPhotos(bon)} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"6px 11px",borderRadius:7,border:"none",background:"#F5E8E2",color:"#C8400A",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.6rem",letterSpacing:1,textTransform:"uppercase",cursor:"pointer"}}>
            📷 {bon.photosBL.length} photo{bon.photosBL.length>1?"s":""}
          </button>
        )}
        {!bon.sent && (
          <button onClick={()=>onDelete(bon.id)} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"6px 11px",borderRadius:7,border:"1px solid #E2DDD6",background:"#FAFAF8",color:"#78716C",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.6rem",letterSpacing:1,textTransform:"uppercase",cursor:"pointer"}}>
            🗑️ Supprimer
          </button>
        )}
      </div>
    </div>
  );
}

function App() {
  const [db, setDB] = useState(loadDB);
  const [tab, setTab] = useState("nouveau");

  // Draft
  const [numero, setNumero] = useState(null);
  const [photosBL, setPhotosBL] = useState([]);
  const [formDate, setFormDate] = useState(today());
  const [formAffaire, setFormAffaire] = useState("");
  const [formChef, setFormChef] = useState("");
  const [formFournisseur, setFormFournisseur] = useState("");
  const [formPrix, setFormPrix] = useState("");
  const [formDetail, setFormDetail] = useState("");

  // UI
  const [toast, setToast] = useState(null);
  const [fullscreen, setFullscreen] = useState(null);
  const [viewBon, setViewBon] = useState(null); // modale photos bon enregistré
  const galerieRef = useRef(null);
  const cameraRef = useRef(null);
  const toastTimer = useRef(null);

  // Config
  const [newAffNum, setNewAffNum] = useState("");
  const [newAffNom, setNewAffNom] = useState("");
  const [newAffClient, setNewAffClient] = useState("Enedis");
  const [newChef, setNewChef] = useState("");
  const [newFour, setNewFour] = useState("");

  useEffect(() => { localStorage.setItem(STORE, JSON.stringify(db)); }, [db]);

  function showToast(msg, type="") {
    setToast({msg,type});
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(()=>setToast(null), 2800);
  }

  const handlePhoto = useCallback(async (e) => {
    e.preventDefault();
    e.stopPropagation();
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const dataUrl = await toDataUrl(file);
      setPhotosBL(prev => [...prev, dataUrl]);
    } catch(err) {
      console.error("Erreur lecture photo:", err);
    }
    e.target.value = "";
  }, []);

  function removePhoto(i) {
    setPhotosBL(prev => prev.filter((_,idx) => idx!==i));
    setFullscreen(null);
  }

  function enregistrer() {
    if (!numero)         { showToast("⚠️ Générez le numéro de bon","warn"); return; }
    if (!formDate)       { showToast("⚠️ Date obligatoire","warn"); return; }
    if (!formAffaire)    { showToast("⚠️ Sélectionnez une affaire","warn"); return; }
    if (!formChef)       { showToast("⚠️ Sélectionnez un chef","warn"); return; }
    if (!formFournisseur){ showToast("⚠️ Sélectionnez un fournisseur","warn"); return; }

    const aff = db.affaires.find(a=>`${a.num} – ${a.nom}`===formAffaire||a.id===formAffaire);
    const affLabel = aff ? `${aff.num} – ${aff.nom}` : formAffaire;
    const bon = {
      id:"B"+Date.now(), numero, date:formDate,
      affaireId: aff?aff.id:formAffaire, affaireLabel:affLabel,
      chef:formChef, fournisseur:formFournisseur,
      prixEstime:parseFloat(formPrix)||0, detail:formDetail,
      photosBL:[...photosBL], createdAt:new Date().toISOString(),
    };

    const subject = encodeURIComponent(`[GCF] Bon ${bon.numero} – ${bon.fournisseur}`);
    const body = encodeURIComponent(`Bonjour,

Nouveau bon de commande.

N° Bon       : ${bon.numero}
Date         : ${formatDate(bon.date)}
Affaire      : ${affLabel}
Chef         : ${bon.chef}
Fournisseur  : ${bon.fournisseur}
Prix estimé  : ${bon.prixEstime?money(bon.prixEstime):"NC"}
Détail       : ${bon.detail||"—"}
Nom PDF      : ${bon.numero}-${bon.fournisseur.replace(/\s/g,"-")}.pdf

Cordialement,
Génie Civil Frontonnais`);

    // 1. Email EN PREMIER
    window.location.href = `mailto:${db.emailBureau}?subject=${subject}&body=${body}`;

    // 2. Reset
    setNumero(null); setPhotosBL([]); setFormDate(today());
    setFormAffaire(""); setFormChef(""); setFormFournisseur(""); setFormPrix(""); setFormDetail("");

    // 3. PDF + Sheets en arrière-plan
    setTimeout(async()=>{
      if(bon.photosBL.length>0){
        await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
        await genPDF(bon,db);
      }
      fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({numero:bon.numero,date:bon.date,affaire:affLabel,chef:bon.chef,
          fournisseur:bon.fournisseur,prix:bon.prixEstime,detail:bon.detail,
          dateEnvoi:new Date().toLocaleString("fr-FR")})}).catch(()=>{});
    },800);
  }

  function effacer() {
    if (!window.confirm("Effacer le brouillon ?")) return;
    setNumero(null); setPhotosBL([]); setFormDate(today());
    setFormAffaire(""); setFormChef(""); setFormFournisseur("");
    setFormPrix(""); setFormDetail("");
  }

  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuXBYBJooMwE0Xw3cJUE0wSPRUXg8gIj3jZ_7ShB_rY2E61FGk1ezEaHJICcObZReJbQ/exec";

  async function envoyerVersSheets(bons) {
    for (const b of bons) {
      const aff = db.affaires.find(a => a.id === b.affaireId);
      try {
        await fetch(SCRIPT_URL, {
          method: "POST", mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            numero: b.numero, date: b.date,
            affaire: aff ? `${aff.num} – ${aff.nom}` : "",
            chef: b.chef, fournisseur: b.fournisseur,
            prix: b.prixEstime, detail: b.detail,
            dateEnvoi: new Date().toLocaleString("fr-FR"),
          }),
        });
      } catch(e) {}
    }
  }

  async function telecharger() {
    const unsent = db.bons.filter(b=>!b.sent);
    if (!unsent.length) { showToast("Aucun bon à envoyer","warn"); return; }
    showToast("⏳ Génération des PDF…");
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js");
    for (const b of unsent) {
      if (b.photosBL?.length) { await genPDF(b,db); await sleep(300); }
    }
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js");
    genExcel(unsent,db);
    showToast("✅ PDF + Excel téléchargés !","ok");
  }

  function ouvrirEmail() {
    const unsent = db.bons.filter(b=>!b.sent);
    if (!unsent.length) { showToast("Aucun bon à envoyer","warn"); return; }
    const affLabel = id => { const a=db.affaires.find(x=>x.id===id); return a?`${a.num} – ${a.nom}`:"—"; };
    const lignes = unsent.map(b=>`• ${b.numero} | ${b.fournisseur} | ${affLabel(b.affaireId)} | ${b.chef} | ${b.prixEstime?money(b.prixEstime):"NC"}`).join("\n");
    const totalEst = unsent.reduce((s,b)=>s+(b.prixEstime||0),0);
    const subject = encodeURIComponent(`[GCF] Bons de commande – ${unsent.length} bon${unsent.length>1?"s":""} – ${new Date().toLocaleDateString("fr-FR")}`);
    const body = encodeURIComponent(`Bonjour,\n\nVeuillez trouver ci-joint les bons de commande de la semaine.\n\nRÉCAPITULATIF (${unsent.length} bon${unsent.length>1?"s":""})\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n${lignes}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nTotal estimé HT : ${money(totalEst)}\n\nCordialement,\nGénie Civil Frontonnais`);
    window.location.href = `mailto:${db.emailBureau}?subject=${subject}&body=${body}`;
  }

  async function confirmerEnvoi() {
    const unsent = db.bons.filter(b=>!b.sent);
    if (!unsent.length) return;
    setDB(prev=>({...prev, bons:prev.bons.map(b=>({...b,sent:true}))}));
    showToast("✅ Bons marqués comme envoyés","ok");
    // Tentative sync Google Sheets en arrière-plan (ne bloque pas si échoue)
    envoyerVersSheets(unsent).catch(()=>{});
  }

  function supprimerBon(id) {
    if (!window.confirm("Supprimer ce bon ?")) return;
    setDB(prev=>({...prev, bons:prev.bons.filter(b=>b.id!==id)}));
  }

  function addAffaire() {
    if (!newAffNum||!newAffNom) { showToast("⚠️ Numéro et intitulé obligatoires","warn"); return; }
    setDB(prev=>({...prev, affaires:[...prev.affaires,{id:"A"+Date.now(),num:newAffNum,nom:newAffNom,client:newAffClient}]}));
    setNewAffNum(""); setNewAffNom(""); showToast("✅ Affaire ajoutée","ok");
  }

// ── HELPERS ──────────────────────────────────────────────────────────────────
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

function loadScript(src) {
  return new Promise(resolve => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement("script");
    s.src = src; s.onload = resolve;
    document.head.appendChild(s);
  });
}

async function genPDF(bon, db) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const aff = db.affaires.find(a=>a.id===bon.affaireId);
  doc.setFillColor(26,58,42); doc.rect(0,0,210,26,"F");
  doc.setTextColor(245,166,35); doc.setFontSize(15); doc.setFont("helvetica","bold");
  doc.text("GCF – Génie Civil Frontonnais",14,11);
  doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont("helvetica","normal");
  doc.text(`Bon de livraison  N° ${bon.numero}`,14,20);
  const rows=[["Date",formatDate(bon.date)],["Affaire",aff?`${aff.num} – ${aff.nom}`:"—"],["Client",aff?.client||"—"],["Chef",bon.chef||"—"],["Fournisseur",bon.fournisseur],["Prix estimé HT",bon.prixEstime?money(bon.prixEstime):"NC"],["Fournitures",bon.detail||"—"]];
  let y=36;
  rows.forEach(([k,v])=>{
    doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(120,113,108);
    doc.text(k,14,y);
    doc.setFont("helvetica","normal"); doc.setTextColor(28,25,23);
    const lines=doc.splitTextToSize(String(v),120);
    doc.text(lines,62,y);
    y+=lines.length>1?lines.length*5+2:7;
  });
  if (bon.photosBL?.length) {
    for (let i=0;i<bon.photosBL.length;i++) {
      doc.addPage();
      doc.setFillColor(26,58,42); doc.rect(0,0,210,16,"F");
      doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont("helvetica","bold");
      doc.text(`BL page ${i+1}/${bon.photosBL.length}  –  ${bon.numero}  –  ${bon.fournisseur}`,14,11);
      try {
        const img=bon.photosBL[i];
        const props=doc.getImageProperties(img);
        const maxW=182,maxH=250;
        let w=maxW,h=(props.height*maxW)/props.width;
        if(h>maxH){h=maxH;w=(props.width*maxH)/props.height;}
        doc.addImage(img,"JPEG",(210-w)/2,22,w,h);
      } catch(e){doc.text("Image non disponible",14,30);}
    }
  }
  doc.save(`${bon.numero}-${bon.fournisseur.replace(/[\s/\\]/g,"-")}.pdf`);
}

function genExcel(bons, db) {
  const XLSX = window.XLSX;
  const rows = bons.map(b=>{
    const aff=db.affaires.find(a=>a.id===b.affaireId);
    return {"N° Bon":b.numero,"Date":b.date,"N° Affaire":aff?.num||"","Chantier":aff?.nom||"","Client":aff?.client||"","Chef":b.chef||"","Fournisseur":b.fournisseur||"","Détail":b.detail||"","Prix estimé HT (€)":b.prixEstime||"","Prix réel facturé HT (€)":"","N° Facture":"","Nom PDF":`${b.numero}-${b.fournisseur?.replace(/\s/g,"-")}.pdf`};
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws["!cols"]=[14,12,12,28,10,20,18,36,14,16,14,32].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Bons");
  XLSX.writeFile(wb,`GCF_Bons_${new Date().toISOString().split("T")[0]}.xlsx`);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
